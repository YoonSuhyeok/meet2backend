services:
  postgres:
    image: postgres:18
    container_name: meetback-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-25432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-meetback}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-meetback}
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql
      - type: bind
        source: ./docker/postgres/init
        target: /docker-entrypoint-initdb.d
        read_only: true

volumes:
  postgres_data:
